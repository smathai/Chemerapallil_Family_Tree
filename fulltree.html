<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Family Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --ink: #1a120a;
    --accent: #7b4f2e;
    --accent2: #b07d4e;
    --muted: #9a8070;
    --card: #fffdf8;
    --border: #ddd5c5;
    --female: #7d3a5a;
    --male: #2a5070;
    --line: #c8b89a;
    --line-dark: #a89070;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Jost', sans-serif; background: var(--bg); color: var(--ink); }

  nav {
    background: var(--ink); display: flex; align-items: center; padding: 0 24px; height: 52px;
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  }
  nav .site-title { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; color: #e8dfd0; margin-right: 32px; white-space: nowrap; }
  nav a { color: #b0a090; text-decoration: none; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 16px 14px; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }
  nav a:hover { color: #e8dfd0; }
  nav a.active { color: #e8c88a; border-color: #e8c88a; }

  .toolbar {
    position: fixed; top: 52px; left: 0; right: 0; z-index: 150;
    background: var(--card); border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; gap: 0; padding: 0 24px; height: 46px;
  }
  .view-tab {
    padding: 0 16px; height: 46px; line-height: 46px; cursor: pointer;
    font-size: 0.78rem; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--muted); border-bottom: 2.5px solid transparent; margin-bottom: -1.5px;
    transition: color 0.2s, border-color 0.2s; white-space: nowrap;
  }
  .view-tab:hover { color: var(--accent); }
  .view-tab.active { color: var(--accent); border-color: var(--accent); }

  .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .root-select {
    padding: 5px 10px; border: 1.5px solid var(--border); border-radius: 5px;
    font-family: 'Jost', sans-serif; font-size: 12px; background: var(--bg); color: var(--ink);
    max-width: 200px;
  }
  .root-select:focus { outline: none; border-color: var(--accent); }

  .search-wrap { position: relative; }
  .search-wrap input {
    padding: 5px 10px; border: 1.5px solid var(--border); border-radius: 5px;
    font-family: 'Jost', sans-serif; font-size: 12px; background: var(--bg); color: var(--ink); width: 180px;
  }
  .search-wrap input:focus { outline: none; border-color: var(--accent); }
  .ac-list {
    position: absolute; top: 100%; right: 0; background: var(--card); border: 1.5px solid var(--border);
    border-radius: 6px; max-height: 200px; overflow-y: auto; z-index: 300;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1); display: none; min-width: 200px;
  }
  .ac-list div { padding: 7px 12px; cursor: pointer; font-size: 13px; }
  .ac-list div:hover { background: var(--bg); }

  /* Canvas area */
  .view-panel { position: fixed; top: 98px; left: 0; right: 0; bottom: 0; display: none; }
  .view-panel.active { display: block; }

  svg.main-svg { width: 100%; height: 100%; cursor: grab; }
  svg.main-svg:active { cursor: grabbing; }

  /* Tooltip */
  #tooltip {
    position: fixed; background: var(--card); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 10px 14px; pointer-events: none;
    display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.12); max-width: 200px; z-index: 400;
  }
  #tooltip .tt-name { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; margin-bottom: 3px; }
  #tooltip .tt-name.F { color: var(--female); }
  #tooltip .tt-name.M { color: var(--male); }
  #tooltip .tt-sub { color: var(--muted); font-size: 12px; }

  /* Controls */
  .zoom-controls {
    position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 5px; z-index: 100;
  }
  .zbtn {
    width: 34px; height: 34px; background: var(--ink); color: #e8dfd0; border: none;
    border-radius: 6px; cursor: pointer; font-size: 17px; display: flex; align-items: center; justify-content: center;
  }
  .zbtn:hover { background: var(--accent); }

  /* Swimlane specific */
  #panel-swim { overflow: auto; cursor: default; }
  .swim-inner { padding: 20px 32px 40px; min-width: 100%; display: inline-block; }
  .swim-decade { display: flex; align-items: flex-start; gap: 0; margin-bottom: 6px; }
  .swim-label { width: 60px; flex-shrink: 0; padding-top: 8px; font-size: 11px; color: var(--muted); font-weight: 500; text-align: right; padding-right: 12px; }
  .swim-track { flex: 1; min-height: 50px; border-top: 1px solid var(--border); padding: 6px 0 6px 8px; display: flex; flex-wrap: wrap; gap: 6px; align-items: flex-start; }
  .swim-node {
    padding: 4px 10px; border-radius: 5px; border: 1.5px solid var(--border); background: var(--card);
    font-size: 11px; cursor: pointer; transition: border-color 0.15s;
    max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .swim-node:hover { border-color: var(--accent); }
  .swim-node.M { color: var(--male); }
  .swim-node.F { color: var(--female); }
</style>
</head>
<body>

<nav>
  <span class="site-title">Chemmarappallil &amp; Kalappurackal</span>
  <a href="tree.html">Tree</a>
  <a href="browse.html">Browse</a>
  <a href="fulltree.html" class="active">Full Tree</a>
  <a href="relationships.html">Relationships</a>
  <a href="submit.html">Suggest a correction</a>
</nav>

<div class="toolbar">
  <div class="view-tab active" data-view="collapsible">Collapsible</div>
  <div class="view-tab" data-view="surname">Surname Tree</div>
  <div class="view-tab" data-view="radial">Radial / Fan</div>
  <div class="view-tab" data-view="swim">Generation Swimlanes</div>
  <div class="toolbar-right">
    <select class="root-select" id="root-select"></select>
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Find person…">
      <div class="ac-list" id="ac-list"></div>
    </div>
  </div>
</div>

<!-- Panels -->
<div class="view-panel active" id="panel-collapsible"><svg class="main-svg" id="svg-collapsible"></svg></div>
<div class="view-panel" id="panel-surname"><svg class="main-svg" id="svg-surname"></svg></div>
<div class="view-panel" id="panel-radial"><svg class="main-svg" id="svg-radial"></svg></div>
<div class="view-panel" id="panel-swim" id="panel-swim"><div class="swim-inner" id="swim-inner"></div></div>

<div id="tooltip"><div class="tt-name" id="tt-name"></div><div class="tt-sub" id="tt-sub"></div></div>

<div class="zoom-controls" id="zoom-controls">
  <button class="zbtn" id="z-in">+</button>
  <button class="zbtn" id="z-out">−</button>
  <button class="zbtn" id="z-fit" style="font-size:13px">⊡</button>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// ─── Data & state ───────────────────────────────────────────────────────────
let ALL = [], BYID = {}, ROOTS_META = [], PERSON_ROOT = {}, currentRoot = null, currentView = 'collapsible';
let highlightId = null; // person to highlight in radial view

const zoomStates = {}; // per-view zoom transform

function yr(d) {
  if (!d) return '';
  const m = (d + '').match(/\b(1[0-9]{3}|20[0-9]{2})\b/);
  return m ? m[1] : '';
}

// ─── Init ────────────────────────────────────────────────────────────────────
async function init() {
  [ALL, { roots: ROOTS_META, person_root: PERSON_ROOT }] = await Promise.all([
    fetch('data.json').then(r => r.json()),
    fetch('tree_meta.json').then(r => r.json()),
  ]);
  ALL.forEach(p => BYID[p.id] = p);

  // Root picker
  const sel = document.getElementById('root-select');
  ROOTS_META.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.id;
    opt.textContent = r.label;
    sel.appendChild(opt);
  });
  currentRoot = ROOTS_META[0].id;
  sel.value = currentRoot;
  sel.addEventListener('change', () => {
    currentRoot = sel.value; highlightId = null;
    document.getElementById('search-input').value = '';
    renderCurrent();
  });

  // Tabs
  document.querySelectorAll('.view-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.view-tab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.view-panel').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      currentView = t.dataset.view;
      document.getElementById(`panel-${currentView}`).classList.add('active');
      document.getElementById('zoom-controls').style.display = currentView === 'swim' ? 'none' : 'flex';
      renderCurrent();
    });
  });

  // Zoom buttons
  document.getElementById('z-in').addEventListener('click', () => zoomBy(1.4));
  document.getElementById('z-out').addEventListener('click', () => zoomBy(1/1.4));
  document.getElementById('z-fit').addEventListener('click', () => fitCurrent());

  setupSearch();

  // URL param support for testing: ?view=radial&highlight=ID
  const params = new URLSearchParams(location.search);
  if (params.get('view')) {
    const v = params.get('view');
    document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
    document.querySelectorAll('.view-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${v}`));
    currentView = v;
    document.getElementById('zoom-controls').style.display = v === 'swim' ? 'none' : 'flex';
  }
  if (params.get('root')) {
    currentRoot = params.get('root');
    document.getElementById('root-select').value = currentRoot;
  }

  renderCurrent();

  if (params.get('highlight')) {
    highlightId = params.get('highlight');
    setTimeout(() => {
      if (currentView === 'radial' && _radialNodeMap[highlightId]) radialHighlight(highlightId);
    }, 300);
  }
}

function renderCurrent() {
  if (currentView === 'collapsible') renderCollapsible();
  else if (currentView === 'surname') renderSurname();
  else if (currentView === 'radial') renderRadial();
  else if (currentView === 'swim') renderSwim();
}

// ─── Tooltip ─────────────────────────────────────────────────────────────────
function showTip(e, name, sub, sex) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-name').textContent = name;
  document.getElementById('tt-name').className = 'tt-name ' + (sex||'');
  document.getElementById('tt-sub').textContent = sub;
  tt.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  const tt = document.getElementById('tooltip');
  tt.style.left = (e.clientX + 14) + 'px';
  tt.style.top  = (e.clientY - 10) + 'px';
}
function hideTip() { document.getElementById('tooltip').style.display = 'none'; }

// ─── Shared zoom setup ───────────────────────────────────────────────────────
function makeZoom(svgEl, gEl, viewKey) {
  const z = d3.zoom().scaleExtent([0.03, 4]).on('zoom', e => {
    gEl.attr('transform', e.transform);
    zoomStates[viewKey] = e.transform;
  });
  d3.select(svgEl).call(z);
  return z;
}
function applyFit(svgEl, gEl, zoom, nodes, nw, nh) {
  const W = svgEl.clientWidth, H = svgEl.clientHeight;
  if (!nodes.length) return;
  const xs = nodes.map(n => n.x || 0), ys = nodes.map(n => n.y || 0);
  const minX = Math.min(...xs), maxX = Math.max(...xs) + nw;
  const minY = Math.min(...ys), maxY = Math.max(...ys) + nh;
  const scale = Math.min(W / (maxX - minX + 80), H / (maxY - minY + 80), 1.5);
  const tx = (W - (maxX - minX) * scale) / 2 - minX * scale;
  const ty = (H - (maxY - minY) * scale) / 2 - minY * scale;
  d3.select(svgEl).transition().duration(400)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

let _zoomRef = null, _fitFn = null;
function zoomBy(k) { if (_zoomRef && _fitFn) { const svg = document.querySelector(`#panel-${currentView} svg`); if (svg) d3.select(svg).transition().duration(250).call(_zoomRef.scaleBy, k); } }
function fitCurrent() { if (_fitFn) _fitFn(); }

// ─── 1. Collapsible tree (D3 hierarchy, expand/collapse nodes) ────────────────
function buildHierarchy(rootId) {
  const visited = new Set();
  function rec(id) {
    if (visited.has(id)) return null;
    visited.add(id);
    const p = BYID[id]; if (!p) return null;
    const node = { id, name: p.display_name, birth: yr(p.birth?.date), sex: p.sex, _collapsed: false };
    const kids = p.children.map(c => rec(c.id)).filter(Boolean);
    if (kids.length) node.children = kids;
    else node._children = [];
    return node;
  }
  return rec(rootId);
}

function renderCollapsible() {
  const svgEl = document.getElementById('svg-collapsible');
  const svg = d3.select(svgEl);
  svg.selectAll('*').remove();
  const g = svg.append('g');
  const zoom = makeZoom(svgEl, g, 'collapsible');
  _zoomRef = zoom;

  const W = svgEl.clientWidth, H = svgEl.clientHeight;
  const NW = 150, NH = 50;

  const root = d3.hierarchy(buildHierarchy(currentRoot));
  // Collapse nodes with > 20 total descendants to start
  root.descendants().forEach(d => {
    if (d.depth > 2 && d.children) { d._children = d.children; d.children = null; }
  });

  const treeLayout = d3.tree().nodeSize([NW + 14, NH + 60]);

  function update() {
    treeLayout(root);
    g.selectAll('*').remove();

    // Links
    g.selectAll('.lk').data(root.links()).join('path').attr('class','lk')
      .attr('d', d3.linkVertical().x(d=>d.x).y(d=>d.y))
      .attr('fill','none').attr('stroke','var(--line)').attr('stroke-width',1.5);

    // Nodes
    const nd = g.selectAll('.nd').data(root.descendants()).join('g').attr('class','nd')
      .attr('transform', d=>`translate(${d.x - NW/2},${d.y})`)
      .style('cursor','pointer')
      .on('click', (e,d) => {
        if (d._children) { d.children = d._children; d._children = null; }
        else if (d.children) { d._children = d.children; d.children = null; }
        update();
      })
      .on('mouseover', (e,d) => showTip(e, d.data.name, d.data.birth, d.data.sex))
      .on('mousemove', moveTip).on('mouseout', hideTip);

    nd.append('rect').attr('width', NW).attr('height', NH).attr('rx', 5)
      .attr('fill', d => d.depth===0?'#fff8ef':'var(--card)')
      .attr('stroke', d => {
        if (d.depth===0) return 'var(--accent)';
        if (d._children) return 'var(--accent2)'; // collapsed = amber border
        return 'var(--border)';
      })
      .attr('stroke-width', d => d.depth===0||d._children ? 2 : 1.5);

    nd.append('text').attr('x', 8).attr('y', 20)
      .attr('font-family','Cormorant Garamond, serif').attr('font-size', 12).attr('font-weight', 600)
      .attr('fill', d => d.data.sex==='F'?'var(--female)':d.data.sex==='M'?'var(--male)':'var(--ink)')
      .text(d => { const n=d.data.name||''; return n.length>17?n.slice(0,16)+'…':n; });

    nd.append('text').attr('x', 8).attr('y', 36)
      .attr('font-family','Jost, sans-serif').attr('font-size', 10).attr('fill','var(--muted)')
      .text(d => d.data.birth || '');

    // Expand/collapse indicator
    nd.filter(d => d._children || d.children)
      .append('text').attr('x', NW - 14).attr('y', 18)
      .attr('font-size', 14).attr('fill','var(--accent2)').attr('text-anchor','middle')
      .text(d => d._children ? '▸' : '▾');

    // Fit on first render
    if (!zoomStates['collapsible']) {
      const allNodes = root.descendants();
      const xs = allNodes.map(n=>n.x), ys = allNodes.map(n=>n.y);
      applyFit(svgEl, g, zoom, allNodes.map(n=>({x:n.x-NW/2, y:n.y})), NW, NH);
    }
  }

  _fitFn = () => {
    const allNodes = root.descendants();
    applyFit(svgEl, g, zoom, allNodes.map(n=>({x:n.x-NW/2, y:n.y})), NW, NH);
  };
  update();
}

// ─── 3. Surname tree ──────────────────────────────────────────────────────────
function renderSurname() {
  const svgEl = document.getElementById('svg-surname');
  const svg = d3.select(svgEl);
  svg.selectAll('*').remove();
  const g = svg.append('g');
  const zoom = makeZoom(svgEl, g, 'surname');
  _zoomRef = zoom;

  // Build surname → surname edges: when person with surname A has child with surname B
  const surnameOf = id => {
    const p = BYID[id]; if (!p) return null;
    for (const n of p.names||[]) if (n.surn) return n.surn;
    return null;
  };

  const edgeCounts = {};
  const surnameMembers = {}; // surname → [person ids]
  for (const p of ALL) {
    const ps = surnameOf(p.id); if (!ps) continue;
    if (!surnameMembers[ps]) surnameMembers[ps] = [];
    surnameMembers[ps].push(p.id);
    for (const ch of p.children) {
      const cs = surnameOf(ch.id); if (!cs || cs === ps) continue;
      const key = `${ps}→${cs}`;
      edgeCounts[key] = (edgeCounts[key]||0) + 1;
    }
  }

  const surnames = Object.keys(surnameMembers).filter(s => surnameMembers[s].length >= 2);
  const surnameSet = new Set(surnames);

  // Nodes: surname boxes
  // Layout: force-directed
  const nodes = surnames.map(s => ({ id: s, count: surnameMembers[s].length }));
  const links = Object.entries(edgeCounts)
    .filter(([k]) => { const [a,b] = k.split('→'); return surnameSet.has(a) && surnameSet.has(b); })
    .map(([k, w]) => { const [s,t] = k.split('→'); return { source: s, target: t, weight: w }; });

  const W = svgEl.clientWidth, H = svgEl.clientHeight;

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(d => Math.max(80, 200 - d.weight * 5)))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collide', d3.forceCollide(70));

  // Draw links
  const lkEl = g.selectAll('.lk').data(links).join('line').attr('class','lk')
    .attr('stroke','var(--line)').attr('stroke-width', d => Math.min(d.weight, 6))
    .attr('stroke-opacity', 0.6);

  // Draw nodes
  const NW2 = 110, NH2 = 42;
  const ndEl = g.selectAll('.nd').data(nodes).join('g').attr('class','nd')
    .style('cursor','pointer')
    .call(d3.drag()
      .on('start', (e,d) => { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end', (e,d) => { if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
    );

  ndEl.append('rect').attr('x', -NW2/2).attr('y', -NH2/2).attr('width', NW2).attr('height', NH2)
    .attr('rx', 6).attr('fill','var(--card)').attr('stroke','var(--border)').attr('stroke-width', 1.5);

  ndEl.append('text').attr('text-anchor','middle').attr('y', -4)
    .attr('font-family','Cormorant Garamond, serif').attr('font-size', 14).attr('font-weight', 600)
    .attr('fill','var(--accent)').text(d => d.id);

  ndEl.append('text').attr('text-anchor','middle').attr('y', 13)
    .attr('font-family','Jost, sans-serif').attr('font-size', 10).attr('fill','var(--muted)')
    .text(d => `${d.count} ${d.count===1?'person':'people'}`);

  sim.on('tick', () => {
    lkEl.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    ndEl.attr('transform',d=>`translate(${d.x},${d.y})`);
  });

  _fitFn = () => {
    sim.stop();
    const ns = nodes.map(n=>({x:(n.x||0)-NW2/2, y:(n.y||0)-NH2/2}));
    applyFit(svgEl, g, zoom, ns, NW2, NH2);
  };
  setTimeout(_fitFn, 2000); // let sim settle first
}

// ─── 4. Radial / Fan ─────────────────────────────────────────────────────────
let _radialZoom = null, _radialSvgEl = null, _radialG = null, _radialNodeMap = {};

function renderRadial() {
  const svgEl = document.getElementById('svg-radial');
  _radialSvgEl = svgEl;
  const svg = d3.select(svgEl);
  svg.selectAll('*').remove();
  _radialNodeMap = {};

  const W = svgEl.clientWidth, H = svgEl.clientHeight;
  const cx = W/2, cy = H/2;

  const g = svg.append('g').attr('transform', `translate(${cx},${cy})`);
  _radialG = g;

  const zoom = d3.zoom().scaleExtent([0.08, 6])
    .on('zoom', e => g.attr('transform', e.transform));
  _radialZoom = zoom;
  _zoomRef = zoom;
  svg.call(zoom).call(zoom.transform, d3.zoomIdentity.translate(cx, cy));

  const root = d3.hierarchy(buildHierarchy(currentRoot));
  const radius = Math.min(W, H) / 2 - 80;
  const radialTree = d3.tree()
    .size([2 * Math.PI, radius])
    .separation((a, b) => (a.parent === b.parent ? 1 : 2) / a.depth);
  radialTree(root);

  // Build id→node map for search
  root.descendants().forEach(d => { _radialNodeMap[d.data.id] = d; });

  // Links
  g.selectAll('.lk').data(root.links()).join('path').attr('class', 'lk')
    .attr('d', d3.linkRadial().angle(d => d.x).radius(d => d.y))
    .attr('fill', 'none').attr('stroke', 'var(--line)').attr('stroke-width', 1.2)
    .attr('opacity', 0.7);

  // Nodes
  const nd = g.selectAll('.nd').data(root.descendants()).join('g').attr('class', 'nd')
    .attr('id', d => 'rn-' + d.data.id.replace(/[@]/g, ''))
    .attr('transform', d => `rotate(${d.x * 180 / Math.PI - 90}) translate(${d.y}, 0)`)
    .style('cursor', 'pointer')
    .on('mouseover', (e, d) => showTip(e, d.data.name, d.data.birth, d.data.sex))
    .on('mousemove', moveTip).on('mouseout', hideTip);

  nd.append('circle').attr('class', 'nd-dot').attr('r', d => d.depth === 0 ? 6 : 4)
    .attr('fill', d => d.data.sex === 'F' ? 'var(--female)' : d.data.sex === 'M' ? 'var(--male)' : 'var(--muted)')
    .attr('stroke', 'var(--card)').attr('stroke-width', 1.5);

  nd.append('text').attr('class', 'nd-label')
    .attr('dy', '0.31em')
    .attr('x', d => d.x < Math.PI ? 8 : -8)
    .attr('text-anchor', d => d.x < Math.PI ? 'start' : 'end')
    .attr('transform', d => d.x >= Math.PI ? 'rotate(180)' : null)
    .attr('font-family', 'Jost, sans-serif')
    .attr('font-size', d => Math.max(7, 11 - d.depth))
    .attr('fill', 'var(--ink)')
    .text(d => { const n = d.data.name || ''; return n.length > 15 ? n.slice(0, 14) + '…' : n; });

  // If we have a highlight target, apply it
  if (highlightId && _radialNodeMap[highlightId]) {
    radialHighlight(highlightId);
  }

  _fitFn = () => {
    svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity.translate(cx, cy).scale(1));
  };
}

function radialHighlight(pid) {
  if (!_radialG) return;
  const nodeData = _radialNodeMap[pid];
  if (!nodeData) return;

  // Collect ancestor chain: target → root
  const ancestorPath = new Set();
  let cur = nodeData;
  while (cur) { ancestorPath.add(cur.data.id); cur = cur.parent; }

  // Ancestor links: an edge is on the path if both source and target are in ancestorPath
  const ancestorLinks = new Set();
  let walk = nodeData;
  while (walk.parent) {
    ancestorLinks.add(`${walk.parent.data.id}→${walk.data.id}`);
    walk = walk.parent;
  }

  // Dim everything
  _radialG.selectAll('.nd-dot').attr('opacity', 0.15).attr('r', d => d.depth === 0 ? 6 : 4);
  _radialG.selectAll('.nd-label').attr('opacity', 0.1);
  _radialG.selectAll('.lk').attr('opacity', 0.06).attr('stroke', 'var(--line)').attr('stroke-width', 1.2);

  // Highlight ancestor links
  _radialG.selectAll('.lk')
    .filter(d => ancestorLinks.has(`${d.source.data.id}→${d.target.data.id}`))
    .attr('opacity', 1)
    .attr('stroke', 'var(--accent)')
    .attr('stroke-width', 2.5);

  // Highlight ancestor nodes
  _radialG.selectAll('.nd').filter(d => ancestorPath.has(d.data.id))
    .select('.nd-dot')
    .attr('opacity', 1)
    .attr('r', d => d.data.id === pid ? 9 : 5)
    .attr('stroke', d => d.data.id === pid ? 'var(--accent)' : 'var(--card)')
    .attr('stroke-width', d => d.data.id === pid ? 3 : 1.5);

  _radialG.selectAll('.nd').filter(d => ancestorPath.has(d.data.id))
    .select('.nd-label')
    .attr('opacity', 1)
    .attr('font-weight', d => d.data.id === pid ? 700 : 400)
    .attr('fill', d => d.data.id === pid ? 'var(--accent)' : 'var(--ink)');

  // Zoom to the highlighted node
  const svgEl = _radialSvgEl;
  const W = svgEl.clientWidth, H = svgEl.clientHeight;
  const angle = nodeData.x - Math.PI / 2;
  const nx = nodeData.y * Math.cos(angle);
  const ny = nodeData.y * Math.sin(angle);
  const scale = 2.2;
  d3.select(svgEl).transition().duration(600)
    .call(_radialZoom.transform,
      d3.zoomIdentity
        .translate(W / 2 - nx * scale, H / 2 - ny * scale)
        .scale(scale)
    );
}

// ─── 5. Generation Swimlanes ──────────────────────────────────────────────────
function renderSwim() {
  const container = document.getElementById('swim-inner');
  container.innerHTML = '';

  // Group by birth decade
  const byDecade = {};
  const unknown = [];
  for (const p of ALL) {
    const y = yr(p.birth?.date);
    if (!y) { unknown.push(p); continue; }
    const decade = Math.floor(parseInt(y) / 10) * 10;
    if (!byDecade[decade]) byDecade[decade] = [];
    byDecade[decade].push(p);
  }

  const decades = Object.keys(byDecade).map(Number).sort((a,b)=>a-b);

  decades.forEach(decade => {
    const people = byDecade[decade].sort((a,b) => (yr(a.birth?.date)||'').localeCompare(yr(b.birth?.date)||''));
    const row = document.createElement('div');
    row.className = 'swim-decade';
    const lbl = document.createElement('div');
    lbl.className = 'swim-label';
    lbl.textContent = decade + 's';
    row.appendChild(lbl);
    const track = document.createElement('div');
    track.className = 'swim-track';
    people.forEach(p => {
      const el = document.createElement('div');
      el.className = 'swim-node ' + (p.sex||'');
      el.textContent = p.display_name;
      el.title = [p.display_name, yr(p.birth?.date), p.clan].filter(Boolean).join(' · ');
      el.addEventListener('click', () => {
        window.location.href = `tree.html?id=${encodeURIComponent(p.id)}`;
      });
      track.appendChild(el);
    });
    row.appendChild(track);
    container.appendChild(row);
  });

  if (unknown.length) {
    const row = document.createElement('div');
    row.className = 'swim-decade';
    const lbl = document.createElement('div'); lbl.className = 'swim-label'; lbl.textContent = '?';
    row.appendChild(lbl);
    const track = document.createElement('div'); track.className = 'swim-track';
    unknown.forEach(p => {
      const el = document.createElement('div');
      el.className = 'swim-node ' + (p.sex||'');
      el.textContent = p.display_name;
      el.addEventListener('click', () => { window.location.href = `tree.html?id=${encodeURIComponent(p.id)}`; });
      track.appendChild(el);
    });
    row.appendChild(track);
    container.appendChild(row);
  }
}

// ─── Search ───────────────────────────────────────────────────────────────────
function setupSearch() {
  const input = document.getElementById('search-input');
  const list = document.getElementById('ac-list');
  const sel = document.getElementById('root-select');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (q.length < 2) { list.style.display = 'none'; return; }
    const hits = ALL.filter(p => p.display_name.toLowerCase().includes(q)).slice(0, 12);
    list.innerHTML = '';
    hits.forEach(p => {
      const div = document.createElement('div');
      const inRadial = currentView === 'radial' && _radialNodeMap[p.id];
      const needsRootSwitch = currentView === 'radial' && !_radialNodeMap[p.id] && PERSON_ROOT[p.id];
      const badge = needsRootSwitch
        ? ` · switches to ${BYID[PERSON_ROOT[p.id]]?.display_name||'new root'}`
        : '';
      div.innerHTML = `${p.display_name}${yr(p.birth?.date) ? ` <span style="color:var(--muted);font-size:11px">(${yr(p.birth.date)})</span>` : ''}${badge ? `<span style="color:var(--accent2);font-size:10px"> ${badge}</span>` : ''}`;

      div.addEventListener('mousedown', e => {
        e.preventDefault();
        input.value = p.display_name;
        list.style.display = 'none';

        if (currentView === 'radial') {
          highlightId = p.id;
          // Check if person is in current radial tree
          if (_radialNodeMap[p.id]) {
            radialHighlight(p.id);
          } else {
            // Switch to the root that contains this person
            const bestRoot = PERSON_ROOT[p.id];
            if (bestRoot) {
              currentRoot = bestRoot;
              sel.value = bestRoot;
              renderRadial(); // will call radialHighlight after render
            } else {
              // Person has no root mapping — just navigate to tree view
              window.location.href = `tree.html?id=${encodeURIComponent(p.id)}`;
            }
          }
        } else {
          // On other views, navigate to focused tree page
          window.location.href = `tree.html?id=${encodeURIComponent(p.id)}`;
        }
      });
      list.appendChild(div);
    });
    list.style.display = 'block';
  });
  input.addEventListener('blur', () => setTimeout(() => list.style.display = 'none', 150));
}

init();
</script>
